syntax = "proto3";

package swiftshare.pairing.v1;

option java_package = "dev.swiftshare.contract.pairing.v1";
option java_multiple_files = true;
option swift_prefix = "SSP1";

message QrPayload {
  uint32 protocol_major = 1;
  uint32 protocol_minor = 2;
  bytes pairing_session_id = 3;
  string host = 4;
  uint32 port = 5;
  bytes certificate_sha256 = 6;
  bytes token = 7;
  uint64 expires_at_epoch_seconds = 8;
}

message DeviceDescriptor {
  bytes certificate_der = 1;
  bytes canonical_spki = 2;
  string display_name = 3;
  string platform = 4;
}

message ClientStart {
  bytes pairing_session_id = 1;
  bytes token = 2;
  DeviceDescriptor device = 3;
  bytes client_nonce = 4;
}

message ServerChallenge {
  DeviceDescriptor device = 1;
  bytes server_nonce = 2;
}

message Proof {
  bytes signature_p1363 = 1;
}

message Decision {
  bool accepted = 1;
  bytes signature_p1363 = 2;
}

message CommitReceipt {
  bytes pairing_session_id = 1;
  bytes transcript_sha256 = 2;
  bytes mac_key_id = 3;
  bytes android_key_id = 4;
  uint64 committed_at_epoch_seconds = 5;
  bytes signature_p1363 = 6;
}

message CommitAck {
  bytes receipt_sha256 = 1;
}

message PairingError {
  string code = 1;
}
